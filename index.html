<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client Intake Form</title>

<style>
  body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
  }

  .container {
    max-width: 700px;
    background: #fff;
    padding: 25px;
    margin: auto;
    border-radius: 8px;
  }

  .step {
    display: none;
  }

  .step.active {
    display: block;
  }

  label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
  }

  .buttons {
    margin-top: 20px;
  }

  button {
    padding: 10px 15px;
    margin-right: 10px;
    cursor: pointer;
  }

  #form-status {
    margin-top: 20px;
    font-weight: bold;
    text-align: center;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Website Planning Form</h1>

  <form id="my-form" action="https://formspree.io/f/xlgagoqn" method="POST">

    <!-- STEP 1 -->
    <div class="step active">
      <h3>Step 1: Business Info</h3>

      <label>Business Name</label>
      <input type="text" name="business_name" required>

      <label>What services do you offer?</label>
      <textarea name="services" required></textarea>

      <div class="buttons">
        <button type="button" onclick="nextStep()">Next</button>
      </div>
    </div>

    <!-- STEP 2 -->
    <div class="step">
      <h3>Step 2: Goals</h3>

      <label>What is the goal of your website?</label>
      <textarea name="goals"></textarea>

      <label>Who are your customers?</label>
      <textarea name="audience"></textarea>

      <div class="buttons">
        <button type="button" onclick="prevStep()">Back</button>
        <button type="button" onclick="nextStep()">Next</button>
      </div>
    </div>

    <!-- STEP 3 -->
    <div class="step">
      <h3>Step 3: Design & Details</h3>

      <label>Preferred style or colors?</label>
      <textarea name="design"></textarea>

      <label>Timeline</label>
      <input type="text" name="timeline">

      <div class="buttons">
        <button type="button" onclick="prevStep()">Back</button>
        <button type="submit">Submit</button>
      </div>
    </div>

  </form>

  <p id="form-status"></p>

</div>

<script>
let currentStep = 0;
const steps = document.querySelectorAll(".step");

function showStep(index) {
  steps.forEach((step, i) => {
    step.classList.toggle("active", i === index);
  });
}

function nextStep() {
  if (currentStep < steps.length - 1) {
    currentStep++;
    showStep(currentStep);
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    showStep(currentStep);
  }
}

// Form submission (no redirect)
const form = document.getElementById("my-form");
const status = document.getElementById("form-status");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  fetch(form.action, {
    method: form.method,
    body: new FormData(form),
    headers: {
      'Accept': 'application/json'
    }
  }).then(response => {
    if (response.ok) {
      form.style.display = "none";
      status.innerHTML = "✅ Thank you! Your responses have been submitted.";
    } else {
      status.innerHTML = "❌ Something went wrong.";
    }
  }).catch(() => {
    status.innerHTML = "❌ Submission failed.";
  });
});
</script>

</body>
</html>
